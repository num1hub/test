name: Validate Capsules

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit/integration/component tests
        run: npm test -- --run

      - name: Validate all capsules
        run: npm run validate -- --dir data/capsules --strict --report

      - name: Run anchor governance gate
        run: npm run check:anchors:full

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: reports/
